  -->
  <g transform="translate(96,80) scale(13.33)"
     stroke="#facc15" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 9H4a2 2 0 0 1-2-2V5h4"/>
